name: Regenerate Sanitized Migration Summary

on:
  push:
    branches: [ main ]
    paths:
      - 'migration_audit/**'
      - 'tools/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch: {}

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -r requirements.txt || true

      - name: Run tests
        run: python -m pytest -q

      - name: Generate sanitized summary if report exists
        run: |
          if [ -f migration_audit/migration_report.json ]; then python tools/generate_sanitized_summary.py; else echo "No migration report found; skipping"; fi

      - name: Commit sanitized summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration_audit/sanitized_summary.json || true
          if git diff --staged --quiet; then echo "No changes to commit"; else git commit -m "ci: regenerate sanitized migration summary [skip ci]" && git push; fi
