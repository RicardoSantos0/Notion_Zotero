name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and mypy
        run: pip install -e . mypy
      - name: Run mypy
        run: mypy src/notion_zotero/ --ignore-missing-imports
