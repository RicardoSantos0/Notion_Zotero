name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with test deps
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest tests/ -v --cov=notion_zotero --cov-report=term-missing --cov-fail-under=70
